name: beatport2rss

services:
  postgres:
    image: postgres:latest
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  token-provider:
    build:
      context: ..
      dockerfile: services/TokenProvider/src/Beatport2Rss.TokenProvider/Dockerfile
    container_name: token-provider
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - BeatportCredentials__Username=${BEATPORT_USERNAME}
      - BeatportCredentials__Password=${BEATPORT_PASSWORD}
      - ChromiumDownloaderOptions__BaseAddress=https://edgedl.me.chromium.org/chromium-browser-snapshots
      - ChromiumDownloaderOptions__CacheDirectory=/app/.cache
    volumes:
      - token-provider-cache:/app/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  token-provider-cache:
