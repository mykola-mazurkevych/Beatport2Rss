name: beatport2rss

services:
  postgres:
    image: postgres:latest
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  token-interceptor:
    build:
      context: ..
      dockerfile: services/TokenInterceptor/src/Beatport2Rss.TokenInterceptor/Dockerfile
    container_name: token-interceptor
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__gRpc__Url=${TOKEN_INTERCEPTOR_GRPC_URI}
      - BeatportCredentials__Username=${BEATPORT_USERNAME}
      - BeatportCredentials__Password=${BEATPORT_PASSWORD}
      - ChromiumDownloaderOptions__BaseAddress=${CHROMIUM_BASE_URL}
    volumes:
      - token-interceptor-cache:/app/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  token-interceptor-cache:
